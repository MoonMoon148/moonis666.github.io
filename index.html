<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden; /* 한 화면에 고정 */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 배경 캔버스 */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 500px; /* 가로폭을 줄여서 더 깔끔하게 */
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-img {
            width: 100%;
            max-width: 280px; /* 모바일 배려하여 크기 조절 */
            height: auto;
            border-radius: 50%; /* 지구 모양에 맞게 둥글게 */
            box-shadow: 0 0 50px rgba(0, 150, 255, 0.3); /* 푸른 빛 효과 */
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            letter-spacing: 5px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        ol {
            list-style: none;
            padding: 0;
            width: 100%;
        }

        li {
            background: rgba(255, 255, 255, 0.05);
            margin: 8px 0;
            padding: 12px 20px;
            font-size: 0.95rem; /* 글자 크기 줄임 */
            border-radius: 50px; /* 알약 모양으로 세련되게 */
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(5px); /* 배경 투명 효과 */
        }

        li:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.4);
        }

        /* 높이가 낮은 폰을 위한 대응 */
        @media (max-height: 650px) {
            .main-img { max-width: 180px; }
            h1 { font-size: 1.5rem; }
            li { padding: 8px 15px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Flat_earth.png/600px-Flat_earth.png" alt="Flat Earth" class="main-img">

        <h1>MOON</h1>
        <p class="subtitle">Choose your path</p>

        <ol>
            <li>1. The earth is round or flat</li>
            <li>2. Save a planet named earth</li>
            <li>3. What's on the back of the MOON</li>
            <li>4. Escape the MATRIX</li>
        </ol>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        let stars = [];
        const starCount = 150;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.1,
                    speed: Math.random() * 0.4 + 0.1, // Grok처럼 천천히 떨어짐
                    opacity: Math.random()
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();

                s.y += s.speed;
                // 화면 아래로 나가면 다시 위에서 생성
                if (s.y > canvas.height) {
                    s.y = -5;
                    s.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
