<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background: #000; /* 깊은 우주 느낌의 블랙 */
            color: #ffffff;
            text-align: center;
            overflow: hidden; /* 스크롤 절대 방지 (한 화면 구성) */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 배경 애니메이션용 캔버스 */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 450px;
            z-index: 1;
            /* 위아래 여백을 최소화하여 한 화면에 배치 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 95vh;
        }

        .main-img {
            width: auto;
            max-width: 80%; /* 이미지 크기 축소 */
            max-height: 35vh; /* 세로 길이에 맞춰 자동 조절 */
            margin: 0 auto 15px auto;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
            display: block;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 4px;
            font-weight: 900;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin: 5px 0 20px 0;
            letter-spacing: 1px;
        }

        ol {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            background: rgba(255, 255, 255, 0.06);
            margin: 8px 0;
            padding: 15px 20px;
            font-size: 0.95rem; /* 글자 크기 살짝 줄임 */
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            cursor: pointer;
        }

        li:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* 기기 높이가 낮을 경우 더 컴팩트하게 조절 */
        @media (max-height: 600px) {
            .main-img { max-height: 25vh; }
            li { padding: 10px; margin: 5px 0; font-size: 0.85rem; }
            .subtitle { margin-bottom: 10px; }
        }
    </style>
</head>
<body>
    <!-- Grok 스타일 배경용 캔버스 -->
    <canvas id="bgCanvas"></canvas>

    <div class="container">
        <!-- 요청하신 로컬 파일 이름 적용 -->
        <img src="the earth.jpg" alt="The Earth" class="main-img">

        <h1>MOON</h1>
        <p class="subtitle">Choose your path</p>

        <ol>
            <li>1. The earth is round or flat</li>
            <li>2. Save a planet named earth</li>
            <li>3. What's on the back of the MOON</li>
            <li>4. Escape the MATRIX</li>
        </ol>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 70;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.1,
                    speed: Math.random() * 0.4 + 0.1, // 천천히 떨어지는 속도
                    alpha: Math.random() * 0.8 + 0.2
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                p.y += p.speed;
                // 바닥에 닿으면 다시 위에서 생성
                if (p.y > canvas.height) {
                    p.y = -10;
                    p.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            init();
        });

        init();
        animate();
    </script>
</body>
</html>
