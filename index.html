<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', Arial, sans-serif;
            background: #000; /* 깊은 검정색 */
            color: #ffffff;
            text-align: center;
            overflow: hidden; /* 스크롤 방지 */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 배경 애니메이션을 위한 캔버스 */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 600px;
            z-index: 1;
        }

        img {
            max-width: 70%; /* 크기 줄임 */
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.2rem; /* 크기 최적화 */
            margin: 0 0 5px 0;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-bottom: 30px;
        }

        ol {
            list-style: none;
            padding: 0;
            margin: 0 auto;
        }

        li {
            background: rgba(255, 255, 255, 0.05);
            margin: 10px 0;
            padding: 15px 20px;
            font-size: 1.1rem; /* 글자 크기 줄임 */
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        li:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.3);
        }

        /* 모바일 대응: 높이가 낮은 기기 배려 */
        @media (max-height: 700px) {
            img { max-width: 50%; margin-bottom: 15px; }
            h1 { font-size: 1.8rem; }
            li { padding: 12px; font-size: 1rem; margin: 8px 0; }
        }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Flat_earth.png/600px-Flat_earth.png" alt="Flat Earth">

        <h1>MOON</h1>
        <p class="subtitle">Choose your path</p>

        <ol>
            <li>1. The earth is round or flat</li>
            <li>2. Save a planet named earth</li>
            <li>3. What's on the back of the MOON</li>
            <li>4. Escape the MATRIX</li>
        </ol>
    </div>

    <script>
        // Grok 스타일의 떨어지는 별/행성 배경 효과
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 100;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.6;

            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                p.y += p.speed; // 아래로 떨어짐
                if (p.y > canvas.height) {
                    p.y = -10;
                    p.x = Math.random() * canvas.width;
                }
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init();
        animate();
    </script>
</body>
</html>
