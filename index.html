<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON</title>
    <!-- 외부 스타일시트 연결 (style.css 또는 스타일.css) -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* 기존 스타일 유지 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background: #000; 
            color: #ffffff;
            text-align: center;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .top-left-moon {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 5vw;
            min-width: 40px;
            height: auto;
            z-index: 2;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
            opacity: 0.8;
        }

        .container {
            width: 90%;
            max-width: 480px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 3.5rem; 
            margin: 0;
            letter-spacing: 12px;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 40%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #666;
            margin: 10px 0 40px 0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        ol {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            background: rgba(255, 255, 255, 0.03);
            margin: 12px 0;
            padding: 20px 25px;
            font-size: 1.1rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        li:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.8rem; letter-spacing: 8px; }
            li { padding: 18px; font-size: 1rem; }
            .top-left-moon { width: 10vw; }
        }
    </style>
</head>
<body>
    <!-- 1. 개인정보 동의 창 (최상단 배치) -->
    <div id="privacy-overlay">
        <h2>개인정보 수집 동의</h2>
        <p>본 사이트는 서비스 개선을 위해 개인정보를 수집할 수 있습니다.<br>동의하십니까?</p>
        <div class="btn-group">
            <button onclick="agree(true)">YES</button>
            <button onclick="agree(false)">NO</button>
        </div>
    </div>

    <canvas id="bgCanvas"></canvas>

    <!-- 좌측 상단 달 이미지 -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg" alt="Moon" class="top-left-moon">

    <div class="container">
        <h1>MOON</h1>
        <p class="subtitle">Choose your path</p>

        <ol>
            <li>1. The earth is round or flat</li>
            <li>2. Save a planet named earth</li>
            <li>3. What's on the back of the MOON</li>
            <li>4. Escape the MATRIX</li>
        </ol>
    </div>

    <!-- 기존 캔버스 애니메이션 스크립트 -->
    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 80;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.1,
                    speed: Math.random() * 0.5 + 0.1,
                    alpha: Math.random() * 0.7 + 0.1
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                p.y += p.speed;
                if (p.y > canvas.height) {
                    p.y = -10;
                    p.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>

    <!-- 2. 동의 로직 자바스크립트 연결 (맨 아래) -->
    <script src="script.js"></script>
</body>
</html>
