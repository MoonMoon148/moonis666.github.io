<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', Arial, sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            text-align: center;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 80px auto;
            padding: 20px;
        }
        img {
            max-width: 85%;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            margin-bottom: 60px;
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 1.3rem;
            color: #aaaaaa;
            margin-bottom: 70px;
        }
        ol {
            list-style: none;
            padding: 0;
            margin: 0 auto;
            max-width: 620px;
        }
        li {
            background: rgba(255, 255, 255, 0.08);
            margin: 18px 0;
            padding: 28px 30px;
            font-size: 1.45rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        li:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 큰 그림 (여기에 원하는 이미지 URL 넣으세요) -->
        <img src="https://picsum.photos/id/1015/1200/650" alt="Main Image">

        <h1>MOON</h1>
        <p class="subtitle">Choose your path</p>

        <ol>
            <li>1. The earth is round or flat</li>
            <li>2. Save a planet named earth</li>
            <li>3. What's on the back of the MOON</li>
            <li>4. Escape the MATRIX</li>
        </ol>
    </div>
</body>
</html>
