<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background: #000; 
            color: #ffffff;
            text-align: center;
            overflow: hidden; /* 스크롤 방지 */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 배경 애니메이션용 캔버스 */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 480px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 3.5rem; /* 사진이 빠진 대신 타이틀 강조 */
            margin: 0;
            letter-spacing: 12px;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 40%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #666;
            margin: 10px 0 40px 0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        ol {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            background: rgba(255, 255, 255, 0.03);
            margin: 12px 0;
            padding: 20px 25px;
            font-size: 1.1rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        li:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* 모바일 대응 */
        @media (max-width: 480px) {
            h1 { font-size: 2.8rem; letter-spacing: 8px; }
            li { padding: 18px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="container">
        <h1>MOON</h1>
        <p class="subtitle">Choose your path</p>

        <ol>
            <li>1. The earth is round or flat</li>
            <li>2. Save a planet named earth</li>
            <li>3. What's on the back of the MOON</li>
            <li>4. Escape the MATRIX</li>
        </ol>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 80;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.1,
                    speed: Math.random() * 0.5 + 0.1,
                    alpha: Math.random() * 0.7 + 0.1
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                p.y += p.speed;
                if (p.y > canvas.height) {
                    p.y = -10;
                    p.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
